[package]
name = "bn"
version = "0.2.0"
edition = "2021"
description = "Task tracker for coding agents"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
shell-escape = "0.1"
termimad = "0.24"
glob = "0.3"
regex = "1"
sha2 = "0.10"
dirs = "5"
notify = { version = "6", default-features = false, features = ["macos_fsevent"] }
signal-hook = "0.3"
libc = "0.2"
daemonize = "0.5"
dialoguer = { version = "0.11", features = ["editor", "fuzzy-select"] }

[[bin]]
name = "bctx"
path = "src/bin/bctx.rs"

[[bin]]
name = "migrate_beans"
path = "tools/migrate_beans.rs"

[dev-dependencies]
tempfile = "3"
